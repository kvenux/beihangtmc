<!doctype html><html lang="zh-CN"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>人脸认领工具 · 北航头马</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@700&display=swap" rel="stylesheet">
<style>
:root{--paper:#ece4d0;--cream:#fbf7ec;--ink:#26301b;--soft:#4c543b;--muted:#857e62;--clover:#4f7d44;--clover-deep:#33602e;--gold:#996b1f;--line:#d1c5a4;--bad:#a8412a}
*{box-sizing:border-box}body{margin:0;font-family:"Noto Sans SC",system-ui,sans-serif;background:var(--paper);color:var(--ink);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.bar{display:flex;align-items:center;gap:16px;padding:10px 18px;background:linear-gradient(180deg,#3f5a2c,#33602e);color:#eef0df;flex:none;box-shadow:0 2px 10px rgba(0,0,0,.2)}
.bar h1{font-family:"Noto Serif SC",serif;font-size:18px;margin:0}
.bar .prog{font-size:13px;color:#d6dcb8}
.bar .sp{flex:1}
.bar button{font-family:inherit;border:1px solid rgba(238,240,223,.4);background:rgba(238,240,223,.12);color:#eef0df;border-radius:7px;padding:7px 13px;cursor:pointer;font-size:13px}
.bar button:hover{background:rgba(238,240,223,.25)}
.bar button.pri{background:var(--gold);color:#2a2208;border-color:var(--gold);font-weight:700}
.main{flex:1;display:flex;min-height:0}
.list{width:250px;flex:none;overflow-y:auto;background:var(--cream);border-right:1px solid var(--line);padding:8px}
.ci{display:flex;align-items:center;gap:9px;padding:7px;border-radius:8px;cursor:pointer;margin-bottom:3px}
.ci:hover{background:rgba(79,125,68,.1)}.ci.on{background:rgba(79,125,68,.18);outline:1px solid var(--clover)}
.ci img{width:42px;height:42px;border-radius:6px;object-fit:cover;flex:none;border:1px solid var(--line)}
.ci .t{font-size:13px;line-height:1.3;min-width:0}.ci .t b{display:block;font-weight:500}
.ci .lab{font-size:11.5px;color:var(--clover-deep);font-weight:700}.ci .lab.skip{color:var(--muted)}
.ci .dot{width:8px;height:8px;border-radius:50%;background:var(--line);flex:none;margin-left:auto}
.ci .dot.done{background:var(--clover)}.ci .dot.skip{background:var(--muted)}
.detail{flex:1;overflow-y:auto;padding:18px 22px}
.dhead{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:6px}
.dhead h2{font-size:19px;margin:0}
.assign{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin:8px 0 4px;position:sticky;top:0;background:var(--paper);padding:8px 0;z-index:2}
.assign input{font-family:inherit;font-size:15px;padding:9px 12px;border:1px solid var(--line);border-radius:8px;background:#fff;width:240px}
.assign input:focus{outline:none;border-color:var(--clover)}
.assign button{font-family:inherit;border:none;border-radius:8px;padding:9px 15px;cursor:pointer;font-size:14px;font-weight:600}
.b-assign{background:var(--clover);color:#fff}.b-skip{background:#e4dcc6;color:var(--soft)}.b-clear{background:#efe7d4;color:var(--muted)}
.sug{margin:2px 0 6px;display:flex;gap:7px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--soft)}
.sg{font-family:inherit;border:1px solid var(--clover);background:rgba(79,125,68,.1);color:var(--clover-deep);border-radius:999px;padding:4px 12px;cursor:pointer;font-size:13px}
.sg:hover{background:var(--clover);color:#fff}.sg i{font-style:normal;opacity:.7;font-size:11px}
.sgh{font-size:11.5px;color:var(--muted)}
.hint{font-size:12.5px;color:var(--muted);margin:2px 0 12px}
.faces{display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));gap:8px}
.face{position:relative;border-radius:8px;overflow:hidden;border:2px solid #fff;box-shadow:0 4px 10px -5px rgba(0,0,0,.4);aspect-ratio:1}
.face img{width:100%;height:100%;object-fit:cover;display:block}
.face .x{position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:rgba(168,65,42,.85);color:#fff;border:none;cursor:pointer;font-size:14px;line-height:22px;text-align:center;padding:0}
.face .src{position:absolute;left:3px;bottom:3px;width:20px;height:20px;border-radius:5px;background:rgba(38,48,27,.7);color:#fff;font-size:11px;line-height:20px;text-align:center;text-decoration:none}
.face.excl{opacity:.32;filter:grayscale(1)}
.face.excl .x{background:rgba(79,125,68,.85)}
.empty{color:var(--muted);padding:40px;text-align:center}
@media(max-width:640px){.list{width:140px}.assign input{width:150px}}
</style></head><body>
<div class="bar">
  <h1>🍀 人脸认领</h1>

  <span class="sp"></span>
  <button id="fTodo" class="pri">只看未认领</button>
  <button id="fAll">全部</button>
  <button id="exp">导出映射 ⬇</button>
</div>
<div class="main">
  <div class="list" id="list"></div>
  <div class="detail" id="detail"><div class="empty">← 从左侧选择一个人脸簇开始</div></div>
</div>

    const nm=st.assign[c.cid]; const skip=nm===SKIP;
    const lab=nm?`<span class="lab ${skip?'skip':''}">${skip?'跳过':nm}</span>`:'';
    return `<div class="ci ${c.cid===cur?'on':''}" data-cid="${c.cid}">
      <img loading="lazy" src="faces/${c.rep}.jpg">
      <div class="t"><b>#${c.cid} · ${c.size}张</b>${lab}</div>
      <span class="dot ${nm?(skip?'skip':'done'):''}"></span></div>`;
  }).join('')||'<div class="empty">没有未认领的簇了 🎉</div>';
  $('list').querySelectorAll('.ci').forEach(el=>el.onclick=()=>{cur=+el.dataset.cid;renderDetail();renderList()});
  prog();
}
function renderDetail(){
  const c=CLUSTERS.find(x=>x.cid===cur); if(!c){return}
  const nm=st.assign[c.cid]||'';
  $('detail').innerHTML=`
    <div class="dhead"><h2>人脸簇 #${c.cid}</h2><span class="muted">${c.size} 张脸</span></div>
    <div class="assign">
      <input id="nin" list="names" placeholder="输入这个人的名字…" value="${nm===SKIP?'':nm}">
      <button class="b-assign" id="bA">✓ 认领</button>
      <button class="b-skip" id="bS">路人 / 跳过</button>
      <button class="b-clear" id="bC">清除</button>
    </div>
    ${c.sug&&c.sug.length?`<div class="sug">🤖 大概率是：${c.sug.map(s=>`<button class="sg" data-n="${s.name}">${s.name} <i>${Math.round(s.score*100)}%</i></button>`).join('')}<span class="sgh">（基于这些照片所在推送里出现的人，仅供参考）</span></div>`:''}
    <div class="hint">给这一簇指认一个人（同一簇默认是同一个人）。不是同一个人的脸，点右上角 ✕ 排除；点左下角 ⧉ 看原图。两簇是同一人？给它们填一样的名字即可。</div>
    <div class="faces">${c.fids.map(f=>`
      <div class="face ${st.excl[f]?'excl':''}" data-fid="${f}">
        <img loading="lazy" src="faces/${f}.jpg">
        <button class="x" data-fid="${f}">${st.excl[f]?'↺':'✕'}</button>
        <a class="src" target="_blank" href="../${FID2FILE[f]}" title="${FID2FILE[f]}">⧉</a>
      </div>`).join('')}</div>`;
  const in_=$('nin'); in_.focus();
  $('bA').onclick=()=>{const v=in_.value.trim(); if(!v)return; st.assign[c.cid]=v; save(); nextTodo()};
  in_.onkeydown=e=>{if(e.key==='Enter'){e.preventDefault();$('bA').click()}};
  $('bS').onclick=()=>{st.assign[c.cid]=SKIP; save(); nextTodo()};
  $('bC').onclick=()=>{delete st.assign[c.cid]; save(); renderDetail(); renderList()};
  $('detail').querySelectorAll('.face .x').forEach(b=>b.onclick=()=>{const f=b.dataset.fid; if(st.excl[f])delete st.excl[f];else st.excl[f]=1; save(); renderDetail(); renderList()});
  $('detail').querySelectorAll('.sg').forEach(b=>b.onclick=()=>{in_.value=b.dataset.n; in_.focus()});
}
function nextTodo(){const nx=CLUSTERS.find(c=>!st.assign[c.cid]); cur=nx?nx.cid:null; renderList(); if(cur!=null)renderDetail(); else $('detail').innerHTML='<div class="empty">全部处理完啦 🎉 点「导出映射」下载结果发给我。</div>'}
$('fTodo').onclick=()=>{filter='todo';renderList()}; $('fAll').onclick=()=>{filter='all';renderList()};
$('exp').onclick=()=>{
  const photo={}, f2n={};
  CLUSTERS.forEach(c=>{const nm=st.assign[c.cid]; if(!nm||nm===SKIP)return; c.fids.forEach(f=>{if(st.excl[f])return; f2n[f]=nm; const p=FID2FILE[f]; (photo[p]=photo[p]||[]); if(!photo[p].includes(nm))photo[p].push(nm)})});
  const out={generated_clusters:CLUSTERS.length, assignments:st.assign, excluded:Object.keys(st.excl), face_to_name:f2n, photo_to_names:photo};
  const blob=new Blob([JSON.stringify(out,null,1)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='face_labels.json'; a.click();
};
renderList(); nextTodo();
</script></body></html>
