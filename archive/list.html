let fy="all", fc="all", fq="";
const yc=document.getElementById('yearChips'), cc=document.getElementById('catChips');
const years=[...new Set(A.map(a=>a.y))].sort().reverse();
function mkchip(p,label,val,cur,cb){const e=document.createElement('span');e.className='chip'+(val===cur?' on':'');e.textContent=label;e.onclick=cb;p.appendChild(e);return e}
function renderChips(){
  yc.innerHTML='';cc.innerHTML='';
  mkchip(yc,'全部年份','all',fy,()=>{fy='all';render()});
  years.forEach(y=>mkchip(yc,y,y,fy,()=>{fy=y;render()}));
  mkchip(cc,'全部类型','all',fc,()=>{fc='all';render()});
  Object.entries(CAT).forEach(([k,v])=>mkchip(cc,v,k,fc,()=>{fc=k;render()}));
}
function render(){
  renderChips();
  const q=fq.trim().toLowerCase();
  const f=A.filter(a=>(fy==='all'||a.y===fy)&&(fc==='all'||a.c===fc)&&
    (!q||a.t.toLowerCase().includes(q)||(a.th||'').toLowerCase().includes(q)||(a.m&&('第'+a.m).includes(q))));
  document.getElementById('count').textContent=`共 ${f.length} 篇`;
  const byYear={};f.forEach(a=>{(byYear[a.y]=byYear[a.y]||[]).push(a)});
  let html='';
  Object.keys(byYear).sort().reverse().forEach(y=>{
    html+=`<div class="yr">${y} <span style="font-size:13px;color:var(--muted)">· ${byYear[y].length} 篇</span></div>`;
    byYear[y].forEach(a=>{
      const tag=a.th?`<span class="tg">${a.th}</span>`:'';
      const mn=a.m?`<span class="mn">#${a.m}</span>`:'';
      const ic=a.ic?`<span class="mn">📷${a.ic}</span>`:'';
      html+=`<a class="row" href="${a.id}.html"><span class="dt">${a.d}</span><span class="tt">${esc(a.t)}</span>${tag}${mn}${ic}</a>`;
    });
  });
  document.getElementById('list').innerHTML=html||'<p style="color:#94866f;padding:30px 0">没有匹配的文章。</p>';
}
function esc(s){return (s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
document.getElementById('q').addEventListener('input',e=>{fq=e.target.value;render()});
render();
